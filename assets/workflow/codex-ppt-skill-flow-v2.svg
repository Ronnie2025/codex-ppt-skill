<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1120" viewBox="0 0 1920 1120" role="img" aria-labelledby="title desc">
  <title id="title">Codex PPT Skill 使用顺序</title>
  <desc id="desc">展示使用顺序：不需要编辑时走整页生图 PPT；需要编辑时，在元素重组和 SVG 拆解之间选择。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.56" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f2f6fb"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1457c7"/>
      <stop offset="1" stop-color="#2f8cff"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c73f3a"/>
      <stop offset="1" stop-color="#ff8265"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#087c89"/>
      <stop offset="1" stop-color="#21b7ab"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="132%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#16304f" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7e91aa"/>
    </marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#236fdf"/>
    </marker>
    <marker id="arrowCoral" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#dd5b4b"/>
    </marker>
    <marker id="arrowTeal" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#159893"/>
    </marker>
    <style>
      .mono { font: 700 18px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; fill: #6c7d91; letter-spacing: 0; }
      .title { font: 800 58px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #10233f; letter-spacing: 0; }
      .subtitle { font: 400 25px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #54657a; letter-spacing: 0; }
      .section { font: 800 28px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #10233f; letter-spacing: 0; }
      .label { font: 700 23px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #10233f; letter-spacing: 0; }
      .body { font: 400 19px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #566579; letter-spacing: 0; }
      .whiteTitle { font: 800 27px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #ffffff; letter-spacing: 0; }
      .whiteBody { font: 400 17px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #eaf3ff; letter-spacing: 0; }
      .stepNum { font: 800 19px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #ffffff; letter-spacing: 0; }
      .stepText { font: 500 18px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #1d314a; letter-spacing: 0; }
      .note { font: 500 16px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #526175; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1920" height="1120" fill="url(#bg)"/>
  <circle cx="1630" cy="150" r="96" fill="#eaf4ff"/>
  <circle cx="170" cy="990" r="110" fill="#fff3ee"/>
  <circle cx="1710" cy="990" r="118" fill="#eef8f7"/>

  <text x="90" y="96" class="mono">CODEX PPT SKILL</text>
  <text x="90" y="166" class="title">先判断是否需要编辑</text>
  <text x="90" y="214" class="subtitle">不需要编辑就生成图片型 PPT；需要编辑时，再选择元素重组或 SVG 拆解。</text>

  <g filter="url(#shadow)">
    <rect x="90" y="292" width="360" height="154" rx="24" fill="#17253b"/>
    <text x="126" y="344" class="whiteTitle">输入材料</text>
    <text x="126" y="384" class="whiteBody">文档 / 旧 PPT / 截图 / 图片页</text>
    <text x="126" y="416" class="whiteBody">业务目标 / 汇报对象 / 交付格式</text>
  </g>

  <path d="M450 369 H548" stroke="#7e91aa" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="560" y="270" width="800" height="198" rx="28" fill="#ffffff" stroke="#d8e5f2" stroke-width="2"/>
    <text x="606" y="328" class="section">选择顺序</text>
    <text x="606" y="374" class="body">1. 只需要展示、PPTX、PDF 或 PNG？走 A。</text>
    <text x="606" y="408" class="body">2. 需要可编辑 PPTX？优先走 B。</text>
    <text x="606" y="442" class="body">3. 只要 SVG 或低成本结构样板？走 C。</text>
  </g>

  <path d="M820 468 C690 520 430 520 322 570" stroke="#236fdf" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M960 468 C960 518 960 530 960 570" stroke="#dd5b4b" stroke-width="4" fill="none" marker-end="url(#arrowCoral)"/>
  <path d="M1100 468 C1240 520 1490 520 1598 570" stroke="#159893" stroke-width="4" fill="none" marker-end="url(#arrowTeal)"/>

  <g filter="url(#shadow)">
    <rect x="90" y="580" width="520" height="424" rx="30" fill="#ffffff" stroke="#d9e8f4" stroke-width="2"/>
    <rect x="90" y="580" width="520" height="86" rx="30" fill="url(#blue)"/>
    <text x="128" y="634" class="whiteTitle">路径 A：整页生图 PPT</text>
    <text x="128" y="701" class="body">适合：不需要编辑，只要能汇报展示。</text>

    <circle cx="134" cy="754" r="18" fill="#236fdf"/><text x="134" y="761" text-anchor="middle" class="stepNum">1</text>
    <text x="170" y="761" class="stepText">整理页纲和逐页生图提示词</text>
    <circle cx="134" cy="805" r="18" fill="#236fdf"/><text x="134" y="812" text-anchor="middle" class="stepNum">2</text>
    <text x="170" y="812" class="stepText">生成 16:9 整页图片</text>
    <circle cx="134" cy="856" r="18" fill="#236fdf"/><text x="134" y="863" text-anchor="middle" class="stepNum">3</text>
    <text x="170" y="863" class="stepText">后处理叠加 Logo / 二维码</text>
    <circle cx="134" cy="907" r="18" fill="#236fdf"/><text x="134" y="914" text-anchor="middle" class="stepNum">4</text>
    <text x="170" y="914" class="stepText">封装 PPTX，导出 PDF / PNG</text>

    <rect x="128" y="940" width="444" height="40" rx="20" fill="#eef5ff"/>
    <text x="150" y="966" class="note">后续要编辑时，可把页图交给 B 或 C。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="700" y="580" width="520" height="424" rx="30" fill="#ffffff" stroke="#d9e8f4" stroke-width="2"/>
    <rect x="700" y="580" width="520" height="86" rx="30" fill="url(#coral)"/>
    <text x="738" y="634" class="whiteTitle">路径 B：元素重组</text>
    <text x="738" y="701" class="body">优先：要可编辑 PPTX，并保留关键视觉元素。</text>

    <circle cx="744" cy="754" r="18" fill="#dd5b4b"/><text x="744" y="761" text-anchor="middle" class="stepNum">1</text>
    <text x="780" y="761" class="stepText">拆文字、容器、图标、箭头和装饰</text>
    <circle cx="744" cy="805" r="18" fill="#dd5b4b"/><text x="744" y="812" text-anchor="middle" class="stepNum">2</text>
    <text x="780" y="812" class="stepText">图标和装饰生成独立透明资产</text>
    <circle cx="744" cy="856" r="18" fill="#dd5b4b"/><text x="744" y="863" text-anchor="middle" class="stepNum">3</text>
    <text x="780" y="863" class="stepText">文字、形状、容器用 PPT 原生对象</text>
    <circle cx="744" cy="907" r="18" fill="#dd5b4b"/><text x="744" y="914" text-anchor="middle" class="stepNum">4</text>
    <text x="780" y="914" class="stepText">组装可编辑 PPTX 并渲染检查</text>

    <rect x="738" y="940" width="444" height="40" rx="20" fill="#fff1ee"/>
    <text x="760" y="966" class="note">更可编辑，效果更完整；耗时和 token 更高。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1310" y="580" width="520" height="424" rx="30" fill="#ffffff" stroke="#d9e8f4" stroke-width="2"/>
    <rect x="1310" y="580" width="520" height="86" rx="30" fill="url(#teal)"/>
    <text x="1348" y="634" class="whiteTitle">路径 C：SVG 拆解</text>
    <text x="1348" y="701" class="body">适合：只要 SVG、文档复用或低成本结构样板。</text>

    <circle cx="1354" cy="754" r="18" fill="#159893"/><text x="1354" y="761" text-anchor="middle" class="stepNum">1</text>
    <text x="1390" y="761" class="stepText">识别文本、容器、线条、箭头、图标</text>
    <circle cx="1354" cy="805" r="18" fill="#159893"/><text x="1354" y="812" text-anchor="middle" class="stepNum">2</text>
    <text x="1390" y="812" class="stepText">用原生 SVG 重建页面层级</text>
    <circle cx="1354" cy="856" r="18" fill="#159893"/><text x="1354" y="863" text-anchor="middle" class="stepNum">3</text>
    <text x="1390" y="863" class="stepText">输出 SVG 和 PNG 预览</text>
    <circle cx="1354" cy="907" r="18" fill="#159893"/><text x="1354" y="914" text-anchor="middle" class="stepNum">4</text>
    <text x="1390" y="914" class="stepText">如需 PPT 内对象编辑，再走 B</text>

    <rect x="1348" y="940" width="444" height="40" rx="20" fill="#eefaf8"/>
    <text x="1370" y="966" class="note">更快更省；复杂视觉会被简化。</text>
  </g>
</svg>
