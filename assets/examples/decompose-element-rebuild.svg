<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">元素重组效果示意</title>
  <desc id="desc">展示从图片页参考输入，到识别页面对象、生成独立透明资产，再组装成可编辑 PowerPoint 的流程效果。</desc>
  <defs>
    <linearGradient id="coral" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ef544c"/>
      <stop offset="1" stop-color="#ff8a68"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#22a7c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#10223f" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M2,2 L14,8 L2,14 Z" fill="#ef544c"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #13243d; }
      .eyebrow { font-size: 24px; font-weight: 700; fill: #6b7c93; letter-spacing: 1px; }
      .title { font-size: 54px; font-weight: 800; }
      .subtitle { font-size: 25px; fill: #52647c; }
      .panel-title { font-size: 32px; font-weight: 800; }
      .small { font-size: 20px; fill: #56657a; }
      .label { font-size: 20px; font-weight: 700; fill: #ffffff; }
      .step { font-size: 22px; font-weight: 800; }
      .note { font-size: 19px; fill: #43546a; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f7fafc"/>
  <circle cx="1320" cy="126" r="96" fill="#e8f2ff"/>
  <circle cx="158" cy="760" r="116" fill="#fff0ea"/>
  <circle cx="1456" cy="808" r="130" fill="#e8f7f3"/>

  <text x="72" y="78" class="eyebrow">PPT 拆解方式一</text>
  <text x="72" y="145" class="title">元素重组：把图片页重建成可编辑 PPTX</text>
  <text x="72" y="190" class="subtitle">适合需要后续改字、换图标、移动箭头、复用页面结构的商业汇报。</text>

  <g filter="url(#shadow)">
    <rect x="76" y="248" width="480" height="440" rx="20" fill="#ffffff" stroke="#cfe0f3" stroke-width="3"/>
    <rect x="104" y="288" width="424" height="352" rx="14" fill="#ffffff" stroke="#d9e4f2" stroke-width="2"/>
    <rect x="136" y="324" width="260" height="28" rx="6" fill="#102a56"/>
    <rect x="136" y="366" width="336" height="16" rx="5" fill="#b8c5d8"/>
    <rect x="136" y="418" width="112" height="120" rx="14" fill="#edf4ff" stroke="#b9d1ff"/>
    <rect x="264" y="418" width="112" height="120" rx="14" fill="#fff4ee" stroke="#ffd3c4"/>
    <rect x="392" y="418" width="80" height="120" rx="14" fill="#eaf8f4" stroke="#b5e3d8"/>
    <circle cx="191" cy="578" r="28" fill="#2563eb"/>
    <circle cx="319" cy="578" r="28" fill="#ef544c"/>
    <path d="M210 574 C252 540, 284 540, 300 572" fill="none" stroke="#102a56" stroke-width="8" stroke-linecap="round"/>
    <path d="M344 578 C378 608, 426 608, 454 564" fill="none" stroke="#20a58f" stroke-width="8" stroke-linecap="round"/>
  </g>
  <text x="113" y="735" class="panel-title">输入：图片页参考</text>
  <text x="113" y="772" class="small">原始截图、图片版 PPT，或整页生图页</text>

  <path d="M595 462 C680 462, 708 462, 780 462" stroke="#ef544c" stroke-width="10" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="630" y="372" width="260" height="56" rx="28" fill="#fff0ea" stroke="#ffc7b8"/>
    <text x="660" y="408" class="step">识别对象与层级</text>
    <rect x="646" y="446" width="228" height="56" rx="28" fill="#eef6ff" stroke="#c5dcff"/>
    <text x="678" y="482" class="step">生成独立资产</text>
    <rect x="650" y="520" width="220" height="56" rx="28" fill="#eefbf8" stroke="#bde9de"/>
    <text x="686" y="556" class="step">原生对象组装</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="934" y="248" width="590" height="440" rx="20" fill="#ffffff" stroke="#cfe0f3" stroke-width="3"/>
    <rect x="978" y="298" width="506" height="326" rx="12" fill="#ffffff" stroke="#e0e8f3" stroke-width="2"/>
    <rect x="1020" y="336" width="242" height="34" rx="6" fill="#102a56"/>
    <rect x="1020" y="388" width="352" height="18" rx="5" fill="#c2ccda"/>
    <rect x="1020" y="446" width="122" height="112" rx="14" fill="#edf4ff" stroke="#2d72e8" stroke-width="4" stroke-dasharray="10 8"/>
    <rect x="1162" y="446" width="122" height="112" rx="14" fill="#fff4ee" stroke="#ef544c" stroke-width="4" stroke-dasharray="10 8"/>
    <rect x="1304" y="446" width="96" height="112" rx="14" fill="#eaf8f4" stroke="#149985" stroke-width="4" stroke-dasharray="10 8"/>
    <circle cx="1081" cy="594" r="30" fill="url(#blue)" stroke="#2563eb" stroke-width="4"/>
    <circle cx="1223" cy="594" r="30" fill="url(#coral)" stroke="#ef544c" stroke-width="4"/>
    <path d="M1108 590 C1152 554, 1190 554, 1203 590" fill="none" stroke="#102a56" stroke-width="9" stroke-linecap="round" stroke-dasharray="1 0"/>
    <path d="M1252 594 C1290 628, 1342 628, 1372 580" fill="none" stroke="#149985" stroke-width="9" stroke-linecap="round"/>
  </g>

  <text x="982" y="735" class="panel-title">输出：可编辑 PPTX</text>
  <text x="982" y="772" class="small">文字、形状、透明资产分层放置，可单独选中和替换</text>

  <g>
    <rect x="1020" y="812" width="132" height="44" rx="22" fill="#102a56"/>
    <text x="1046" y="841" class="label">原生文字</text>
    <rect x="1174" y="812" width="132" height="44" rx="22" fill="#2563eb"/>
    <text x="1200" y="841" class="label">PPT 形状</text>
    <rect x="1328" y="812" width="132" height="44" rx="22" fill="#ef544c"/>
    <text x="1348" y="841" class="label">透明资产</text>
  </g>

  <text x="72" y="846" class="note">效果重点：不是把原图铺底，而是把页面拆成可维护对象，再重新组装。</text>
</svg>
