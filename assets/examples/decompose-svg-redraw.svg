<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SVG 拆解效果示意</title>
  <desc id="desc">展示从图片页参考输入，到抽取页面结构并重写为 SVG 图层的流程效果。</desc>
  <defs>
    <linearGradient id="teal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f8f89"/>
      <stop offset="1" stop-color="#31c2ac"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#102a56"/>
      <stop offset="1" stop-color="#35587c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#10223f" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
      <path d="M2,2 L14,8 L2,14 Z" fill="#0f8f89"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #13243d; }
      .eyebrow { font-size: 24px; font-weight: 700; fill: #6b7c93; letter-spacing: 1px; }
      .title { font-size: 54px; font-weight: 800; }
      .subtitle { font-size: 25px; fill: #52647c; }
      .panel-title { font-size: 32px; font-weight: 800; }
      .small { font-size: 20px; fill: #56657a; }
      .label { font-size: 20px; font-weight: 700; fill: #ffffff; }
      .step { font-size: 22px; font-weight: 800; }
      .note { font-size: 19px; fill: #43546a; }
      .code { font-size: 22px; fill: #52647c; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f7fafc"/>
  <circle cx="1330" cy="128" r="96" fill="#e8f7f3"/>
  <circle cx="154" cy="770" r="116" fill="#edf4ff"/>
  <circle cx="1458" cy="812" r="130" fill="#fff0ea"/>

  <text x="72" y="78" class="eyebrow">PPT 拆解方式二</text>
  <text x="72" y="145" class="title">SVG 拆解：把图片页还原为轻量结构</text>
  <text x="72" y="190" class="subtitle">适合网页、文档、说明页复用，或先用较低成本看清页面结构。</text>

  <g filter="url(#shadow)">
    <rect x="76" y="248" width="480" height="440" rx="20" fill="#ffffff" stroke="#cfe0f3" stroke-width="3"/>
    <rect x="104" y="288" width="424" height="352" rx="14" fill="#ffffff" stroke="#d9e4f2" stroke-width="2"/>
    <rect x="136" y="324" width="260" height="28" rx="6" fill="#102a56"/>
    <rect x="136" y="366" width="336" height="16" rx="5" fill="#b8c5d8"/>
    <rect x="136" y="418" width="112" height="120" rx="14" fill="#edf4ff" stroke="#b9d1ff"/>
    <rect x="264" y="418" width="112" height="120" rx="14" fill="#fff4ee" stroke="#ffd3c4"/>
    <rect x="392" y="418" width="80" height="120" rx="14" fill="#eaf8f4" stroke="#b5e3d8"/>
    <path d="M152 584 C230 528, 314 642, 455 554" fill="none" stroke="#102a56" stroke-width="9" stroke-linecap="round"/>
  </g>
  <text x="113" y="735" class="panel-title">输入：图片页参考</text>
  <text x="113" y="772" class="small">原始截图、图片版 PPT，或整页生图页</text>

  <path d="M595 462 C680 462, 708 462, 780 462" stroke="#0f8f89" stroke-width="10" fill="none" marker-end="url(#arrow)"/>
  <g>
    <rect x="632" y="372" width="256" height="56" rx="28" fill="#e8f7f3" stroke="#bde9de"/>
    <text x="670" y="408" class="step">抽取页面结构</text>
    <rect x="644" y="446" width="232" height="56" rx="28" fill="#eef6ff" stroke="#c5dcff"/>
    <text x="678" y="482" class="step">重写 SVG 图层</text>
    <rect x="650" y="520" width="220" height="56" rx="28" fill="#fff4ee" stroke="#ffd3c4"/>
    <text x="686" y="556" class="step">输出预览文件</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="934" y="248" width="590" height="440" rx="20" fill="#ffffff" stroke="#cfe0f3" stroke-width="3"/>
    <rect x="980" y="296" width="306" height="328" rx="12" fill="#ffffff" stroke="#d7e3f2" stroke-width="2"/>
    <rect x="1022" y="336" width="178" height="28" rx="6" fill="url(#ink)"/>
    <rect x="1022" y="386" width="210" height="16" rx="5" fill="#bdc9d9"/>
    <rect x="1022" y="442" width="96" height="88" rx="12" fill="#edf4ff" stroke="#2563eb" stroke-width="3"/>
    <rect x="1136" y="442" width="96" height="88" rx="12" fill="#eaf8f4" stroke="#0f8f89" stroke-width="3"/>
    <path d="M1038 574 C1084 528, 1134 628, 1224 552" fill="none" stroke="#102a56" stroke-width="8" stroke-linecap="round"/>
    <circle cx="1038" cy="574" r="7" fill="#0f8f89"/>
    <circle cx="1084" cy="528" r="7" fill="#0f8f89"/>
    <circle cx="1134" cy="628" r="7" fill="#0f8f89"/>
    <circle cx="1224" cy="552" r="7" fill="#0f8f89"/>

    <rect x="1314" y="296" width="164" height="328" rx="12" fill="#f8fafc" stroke="#d7e3f2" stroke-width="2"/>
    <text x="1342" y="342" class="code">&lt;text&gt;</text>
    <text x="1342" y="390" class="code">&lt;rect&gt;</text>
    <text x="1342" y="438" class="code">&lt;path&gt;</text>
    <text x="1342" y="486" class="code">&lt;line&gt;</text>
    <text x="1342" y="534" class="code">&lt;svg&gt;</text>
    <line x1="1296" y1="338" x2="1314" y2="338" stroke="#9fb1c7" stroke-width="3"/>
    <line x1="1296" y1="388" x2="1314" y2="388" stroke="#9fb1c7" stroke-width="3"/>
    <line x1="1296" y1="482" x2="1314" y2="482" stroke="#9fb1c7" stroke-width="3"/>
  </g>

  <text x="982" y="735" class="panel-title">输出：SVG / PNG 预览</text>
  <text x="982" y="772" class="small">文本、容器、线条、箭头按 SVG 图层重写，便于文档和网页复用</text>

  <g>
    <rect x="982" y="812" width="112" height="44" rx="22" fill="#0f8f89"/>
    <text x="1020" y="841" class="label">更快</text>
    <rect x="1118" y="812" width="138" height="44" rx="22" fill="#2563eb"/>
    <text x="1144" y="841" class="label">更省 token</text>
    <rect x="1280" y="812" width="180" height="44" rx="22" fill="#102a56"/>
    <text x="1306" y="841" class="label">适合结构复用</text>
  </g>

  <text x="72" y="846" class="note">效果重点：结构还原更轻量，但复杂 3D、插画和拟物视觉会被简化。</text>
</svg>
